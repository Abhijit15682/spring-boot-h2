# H2 Console and Connection Setup
spring.datasource.url=jdbc:h2:mem:secure_api_db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate/JPA auto-creation parameters
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Custom Application Security Values (Secret must be at least 256 bits/32 characters)
app.jwt.secret=9a4f2c8d3e7b1a5c6f8e0d2c4b6a8f1e3d5c7b9a0f2e4d6c8b0a2f4e6d8c0a2f
app.jwt.expiration-ms=86400000
